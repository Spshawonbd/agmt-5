<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>GitHub Issues Tracker - Part 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
        }
    </style>
</head>
<body class="bg-[#F8FAFC]">
      <div id="login-page" class="min-h-screen flex items-center justify-center p-3">
    <div class="login-container bg-white p-6 sm:p-8 rounded-2xl shadow-lg w-full max-w-md mx-auto">
    
        <div class="text-center mb-6">
            
            <div class="flex justify-center mb-4">
                <img class="w-16 h-16 sm:w-20 sm:h-20 object-contain" src="./Images/github-logo.png" alt="GitHub Logo">
            </div>
            <h1 class="login-title text-2xl sm:text-3xl font-bold text-gray-800">GitHub Issues Tracker</h1>
            <p class="text-gray-500 text-xs sm:text-sm mt-1">Sign in to manage your issues</p>
        </div>
        
        <!-- লগইন ফর্ম -->
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
                <input type="text" id="username" value="admin" 
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#4F46E5] focus:border-transparent text-base">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                <input type="password" id="password" value="admin123" 
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#4F46E5] focus:border-transparent text-base">
            </div>
            <button onclick="handleLogin()" 
                    class="w-full bg-[#4F46E5] text-white py-3 rounded-lg font-semibold hover:bg-[#4338CA] active:bg-[#4338CA] transition duration-300 shadow-md text-base min-h-[44px]">
                Sign In
            </button>
        </div>
        
    
        <div class="mt-6 pt-4 border-t border-gray-200">
            <p class="text-xs text-gray-400 uppercase font-bold mb-2">Demo Credentials</p>
            <div class="bg-gray-50 p-3 rounded-lg border border-gray-200">
                <p class="text-sm"><span class="font-semibold">Username:</span> admin</p>
                <p class="text-sm"><span class="font-semibold">Password:</span> admin123</p>
            </div>
        </div>
    </div>
</div>
 <div id="main-content" class="hidden">
  <h1> hello</h1>
 </div>
 <script src="script/script.js"></script>
</body>
</html>

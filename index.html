<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker | Assignment 5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FBFAFC; }
        .active-tab-btn { background-color: #5D2BFF !important; color: white !important; }
        .tab-btn { background-color: white; color: #6B7280; border: 1px solid #E5E7EB; transition: all 0.3s; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body>



    <!-- ================= Login Page (Your Original Style) ================= -->




    <div id="login-page" class="flex flex-col items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 md:p-12 rounded-lg shadow-sm border border-gray-100 w-full max-w-[450px] text-center">
            <img src="Images/github-logo.png" class="w-16 mx-auto mb-6">
            <h2 class="text-2xl font-bold text-[#1F2937]">GitHub Issues Tracker</h2>
            <p class="text-gray-500 mb-8 mt-2">Sign in to manage your issues</p>
            
            <div class="text-left mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                <input type="text" id="username" placeholder="Enter Username" class="w-full p-3 border border-gray-200 rounded-md outline-none focus:ring-1 focus:ring-purple-500">
                <p class="text-xs text-indigo-600 mt-1">Default: admin</p>
            </div>
            
            <div class="text-left mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                <input type="password" id="password" placeholder="Enter Password" class="w-full p-3 border border-gray-200 rounded-md outline-none focus:ring-1 focus:ring-purple-500">
                <p class="text-xs text-indigo-600 mt-1">Default: admin123</p>
            </div>
            
            <button onclick="handleLogin()" class="w-full bg-[#5D2BFF] text-white py-3 rounded-md font-semibold text-lg hover:bg-opacity-90">Sign In</button>
        </div>
    </div>
                   <!-- ====== done======= -->
         <!-- ================= Main Page ================= -->



    <div id="main-page" class="hidden">
        <nav class="bg-white py-3 px-6 md:px-12 border-b flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center gap-2">
                <img src="Images/github-logo.png" class="w-8">
                <span class="font-bold text-lg text-gray-800">GitHub Issues Tracker</span>
            </div>
            <div class="flex items-center gap-3">


                <!-- Search for Desktop -->



                <div class="relative hidden md:block">
   <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </span>
                    <input type="text" id="search-input" onkeyup="handleSearch('desktop')" placeholder="Search issues..." class="border border-gray-200 p-2 pl-10 rounded-md w-64 lg:w-80 bg-white outline-none focus:ring-1 focus:ring-purple-500 text-sm">
                </div>
                <button class="bg-[#5D2BFF] text-white px-5 py-2 rounded-md font-medium text-sm">+ New Issue</button>
            </div>
        </nav>



        <!-- Mobile Search Bar (Always visible on mobile) -->



        <div class="md:hidden p-4 bg-white border-b">
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </span>
                <input type="text" id="search-input-mobile" onkeyup="handleSearch('mobile')" placeholder="Search issues..." class="w-full border border-gray-200 p-2 pl-10 rounded-md bg-gray-50 outline-none text-sm">
            </div>
        </div>

        <main class="max-w-[1200px] mx-auto p-4 md:p-8">


            <!-- Filter Tabs -->


            <div class="bg-white p-5 rounded-xl border border-gray-100 shadow-sm mb-6">
                <div class="flex gap-2 overflow-x-auto pb-1">
                    <button onclick="filterIssues('all')" id="tab-all" class="tab-btn active-tab-btn px-8 py-2 rounded-md font-medium text-sm whitespace-nowrap">All</button>
                    <button onclick="filterIssues('open')" id="tab-open" class="tab-btn px-8 py-2 rounded-md font-medium text-sm whitespace-nowrap">Open</button>
                    <button onclick="filterIssues('closed')" id="tab-closed" class="tab-btn px-8 py-2 rounded-md font-medium text-sm whitespace-nowrap">Closed</button>
                </div>
            </div>

            <!-- Stats Header -->



            <div class="flex justify-between items-center mb-6 px-1">
                <div class="flex items-center gap-3">
                    <div class="bg-purple-100 p-2.5 rounded-full text-[#5D2BFF]">
                      <img src="./Images/Aperture.png" alt="" srcset="">
                    </div>
                    <div>
                        <h2 id="issue-count-text" class="text-xl font-bold text-gray-800 leading-tight">0 Issues</h2>
                        <p class="text-[11px] text-gray-500 font-medium">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-3 text-[11px] font-bold text-gray-500">
                    <span class="flex items-center gap-1"><span class="w-2 h-2 bg-green-500 rounded-full"></span> Open</span>
                    <span class="flex items-center gap-1"><span class="w-2 h-2 bg-purple-500 rounded-full"></span> Closed</span>
                </div>
            </div>

            <!-- Loading Spinner (For Tabs and Initial Fetch) -->


            <div id="loader" class="hidden flex flex-col items-center justify-center py-24">
                <div class="w-10 h-10 rounded-full border-4 border-purple-100 border-t-purple-600 animate-spin"></div>
                <p class="mt-4 text-purple-600 font-semibold text-sm animate-pulse">Loading Data...</p>
            </div>

            <!-- Issue Container -->



            <div id="issue-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
        </main>
    </div>



    <div id="modal" class="fixed inset-0 bg-black/50 backdrop-blur-[2px] hidden flex items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-xl w-full max-w-2xl shadow-2xl overflow-hidden">
            <div id="modal-content" class="p-8"></div>
            <div class="p-4 bg-gray-50 border-t text-right">
                <button onclick="closeModal()" class="bg-[#5D2BFF] text-white px-6 py-2 rounded-md font-bold text-sm">Close</button>
            </div>
        </div>
    </div>

    <script src="script/script.js"></script>
</body>
</html>
